<!-- frontend/src/pages/track-order.html -->
<section class="track-order-section" id="track-order-section">
  <div class="container">
    <h2 class="section-title">Track Your Order</h2>
    <form id="track-form">
      <div class="form-group">
        <label>Order Number</label>
        <input type="text" id="order-number" placeholder="SL123456" required>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="order-email" placeholder="your@email.com" required>
      </div>
      <button type="submit" class="btn">Track Order</button>
    </form>
    <div id="tracking-result" class="tracking-result" style="display: none;"></div>
  </div>
</section>
