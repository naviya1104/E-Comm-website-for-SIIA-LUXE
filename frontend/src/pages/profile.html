<!-- frontend/src/pages/profile.html -->
<section class="profile-section" id="profile-section">
  <div class="container">
    <h2 class="section-title">My Profile</h2>
    <div class="profile-info">
      <p><strong>Name:</strong> <span id="profile-name">John Doe</span></p>
      <p><strong>Email:</strong> <span id="profile-email">john@example.com</span></p>
    </div>
    <div class="profile-actions">
      <button class="btn" onclick="editProfile()">Edit Profile</button>
      <button class="btn secondary" onclick="logoutUser()">Logout</button>
    </div>
  </div>
</section>
