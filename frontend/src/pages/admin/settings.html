<!-- frontend/src/pages/admin/settings.html -->
<section class="admin-section" id="admin-settings">
  <div class="container">
    <h2 class="section-title">Site Settings</h2>
    <form id="settings-form">
      <div class="form-group">
        <label>Store Name</label>
        <input type="text" id="store-name" placeholder="SIIA LUXE JEWELS">
      </div>
      <div class="form-group">
        <label>Support Email</label>
        <input type="email" id="support-email" placeholder="support@siialuxe.com">
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" id="support-phone" placeholder="+1 (555) 123-4567">
      </div>
      <button type="submit" class="btn">Update Settings</button>
    </form>
  </div>
</section>
